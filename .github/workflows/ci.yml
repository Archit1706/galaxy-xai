name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install ".[serve,track,monitor,train,dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Tests (pytest)
        run: pytest -q

      - name: Smoke train (pipeline runs end to end)
        run: python -m src.train --smoke --no-register --tracking-uri sqlite:///mlflow_ci.db

      - name: Eval gate (block low-accuracy models)
        run: python -m src.eval_gate --floor 0.9
