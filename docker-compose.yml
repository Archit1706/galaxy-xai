# GalaxyServe stack: inference service (Phase 1) + MLflow registry (Phase 2) +
# Prometheus & Grafana monitoring with drift (Phase 3).

services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.21.3
    container_name: mlflow
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:5000/health').status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - galaxynet

  galaxyserve:
    build:
      context: .
      dockerfile: Dockerfile
    image: galaxyserve:latest
    container_name: galaxyserve
    depends_on:
      mlflow:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Trained weights mounted read-only — fallback source if the registry is empty.
      - ./models:/app/models:ro
      # Prediction/input logs land here (used by monitoring in Phase 3).
      - ./data:/app/data
    environment:
      # Load the Production model from the registry; fall back to the file if empty.
      GALAXYSERVE_USE_REGISTRY: "true"
      GALAXYSERVE_MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      GALAXYSERVE_REGISTRY_STAGE: Production
      GALAXYSERVE_WEIGHTS_PATH: /app/models/resnet18_galaxy_best.pth
      GALAXYSERVE_DEVICE: cpu
      GALAXYSERVE_LOG_LEVEL: info
      GALAXYSERVE_MAX_BATCH_SIZE: "32"
      # Monitoring / drift
      GALAXYSERVE_MONITORING_ENABLED: "true"
      GALAXYSERVE_REFERENCE_PATH: /app/data/reference/reference.csv
      GALAXYSERVE_PREDICTION_LOG_PATH: /app/data/production/prediction_log.jsonl
      GALAXYSERVE_DRIFT_CHECK_INTERVAL_S: "30"
      GALAXYSERVE_DRIFT_MIN_SAMPLES: "30"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - galaxynet

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - galaxynet

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - galaxynet

volumes:
  mlflow_data:
  prometheus_data:
  grafana_data:

networks:
  galaxynet:
    driver: bridge
